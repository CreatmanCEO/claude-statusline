<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 280" width="980" height="280" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Helvetica, Arial">
  <title>claude-statusline — segments annotated</title>
  <desc>Annotated breakdown of the claude-statusline output: each segment shows model, git branch, lines added/removed, theoretical or real cost, 5-hour and weekly usage limits, session duration, VPS health with auto-focus marker, and context window percentage.</desc>

  <rect x="0" y="0" width="980" height="280" fill="#0d1117"/>

  <!-- Top label -->
  <text x="490" y="32" text-anchor="middle" font-size="16" fill="#e6edf3" font-weight="600">What every segment of claude-statusline tells you</text>

  <!-- The status line itself, monospace, dark bg -->
  <rect x="20" y="56" width="940" height="48" rx="8" fill="#161b22" stroke="#30363d"/>

  <!-- segments — coordinates chosen to leave room for labels above and below -->
  <g font-family="ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace" font-size="14">
    <text x="38"  y="86" fill="#cc785c">Opus 4.7</text>
    <text x="118" y="86" fill="#dcdcaa">main*</text>
    <text x="172" y="86" fill="#3b9eff">+47/-12</text>
    <text x="246" y="86" fill="#27c93f">~$3.85(api)</text>
    <text x="354" y="86" fill="#22c55e">H:82% 3h12m</text>
    <text x="476" y="86" fill="#22c55e">W:94%</text>
    <text x="540" y="86" fill="#888">45m</text>
    <text x="582" y="86" fill="#9d6cff">▶ main●</text>
    <text x="650" y="86" fill="#ff5f56">new◉(R:92%)</text>
    <text x="770" y="86" fill="#27c93f">sec●</text>
    <text x="816" y="86" fill="#22c55e">22% ctx</text>
  </g>

  <!-- TOP labels (segments above the bar) -->
  <g font-size="10" fill="#7d8590">
    <!-- Model -->
    <line x1="62" y1="56" x2="62" y2="40" stroke="#cc785c"/>
    <text x="62" y="32" text-anchor="middle" fill="#cc785c">model</text>

    <!-- Git -->
    <line x1="138" y1="56" x2="138" y2="40" stroke="#dcdcaa"/>
    <text x="138" y="32" text-anchor="middle" fill="#dcdcaa">git</text>

    <!-- Lines -->
    <line x1="208" y1="56" x2="208" y2="40" stroke="#3b9eff"/>
    <text x="208" y="32" text-anchor="middle" fill="#3b9eff">lines</text>

    <!-- Cost -->
    <line x1="298" y1="56" x2="298" y2="40" stroke="#27c93f"/>
    <text x="298" y="32" text-anchor="middle" fill="#27c93f">cost</text>

    <!-- 5h limit -->
    <line x1="412" y1="56" x2="412" y2="40" stroke="#22c55e"/>
    <text x="412" y="32" text-anchor="middle" fill="#22c55e">5-hour quota</text>
  </g>

  <!-- BOTTOM labels -->
  <g font-size="10" fill="#7d8590">
    <!-- weekly -->
    <line x1="500" y1="104" x2="500" y2="120" stroke="#22c55e"/>
    <text x="500" y="134" text-anchor="middle" fill="#22c55e">weekly quota</text>

    <!-- duration -->
    <line x1="554" y1="104" x2="554" y2="120" stroke="#7d8590"/>
    <text x="554" y="134" text-anchor="middle" fill="#7d8590">duration</text>

    <!-- VPS focus -->
    <line x1="615" y1="104" x2="615" y2="120" stroke="#9d6cff"/>
    <text x="615" y="134" text-anchor="middle" fill="#9d6cff">▶ auto-focused VPS</text>

    <!-- VPS warn -->
    <line x1="700" y1="104" x2="700" y2="120" stroke="#ff5f56"/>
    <text x="700" y="134" text-anchor="middle" fill="#ff5f56">VPS over threshold</text>

    <!-- VPS ok -->
    <line x1="786" y1="104" x2="786" y2="120" stroke="#27c93f"/>
    <text x="786" y="134" text-anchor="middle" fill="#27c93f">VPS healthy</text>

    <!-- ctx -->
    <line x1="856" y1="104" x2="856" y2="120" stroke="#22c55e"/>
    <text x="856" y="134" text-anchor="middle" fill="#22c55e">context %</text>
  </g>

  <!-- Legend below -->
  <g font-size="11" fill="#9ca3af">
    <text x="40" y="172" fill="#e6edf3" font-weight="600">VPS status glyphs</text>
    <text x="40" y="192">● ok</text>
    <text x="120" y="192" fill="#dcdcaa">◉ warn (&gt;80%)</text>
    <text x="240" y="192" fill="#ff5f56">✗ down</text>
    <text x="320" y="192" fill="#9d6cff">↻ booting</text>
    <text x="420" y="192" fill="#7d8590">▽ stale (&gt;120s)</text>

    <text x="40" y="224" fill="#e6edf3" font-weight="600">Auto-focus</text>
    <text x="40" y="244">▶ marker = the VPS this Claude Code session has been actively SSH-ing into recently</text>

    <text x="40" y="264">    detection: parses last 20 KB of ~/.claude/projects/*.jsonl for ssh/scp/sftp commands and matches against VPS_SERVERS</text>
  </g>
</svg>
