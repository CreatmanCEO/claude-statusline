# ============================================================================
# claude-statusline — конфигурация
# Файл: ~/.claude/statusline.conf
#
# Раскомментируй и измени нужные параметры.
# После изменения перезапуск не нужен — подхватится при следующем ответе Claude.
# ============================================================================

# --- Что показывать ----------------------------------------------------------

# SHOW_MODEL=true              # Имя модели (Opus / Sonnet / Haiku)
# SHOW_COST=true               # Стоимость (теоретическая API или реальная)
# SHOW_CONTEXT=true            # Процент контекстного окна + прогресс-бар
# SHOW_LINES=true              # Добавленные/удалённые строки кода
# SHOW_DURATION=true           # Длительность сессии
# SHOW_GIT=true                # Git branch + dirty status
# SHOW_TOKENS=false            # Точное кол-во токенов (input → output)
# SHOW_VPS=false               # VPS-метрики: RAM, CPU load, диск

# --- VPS-мониторинг ----------------------------------------------------------
# Три режима:
#   SHOW_VPS=remote  — метрики удалённых VPS через vps-poller (CC на Windows/Mac)
#   SHOW_VPS=local   — метрики текущей машины (CC запущен на самом VPS по SSH)
#   SHOW_VPS=false   — отключено (по умолчанию)
#
# Для remote-режима нужен vps-poller.sh в фоне + список серверов ниже.

# SHOW_VPS=false

# Список VPS для мониторинга поллером.
# Формат: "имя|хост|порт|юзер|ssh-ключ"
#
# VPS_SERVERS=(
#   "main|95.85.234.200|22|root|~/.ssh/claude_vps"
#   "new|95.85.235.189|22|root|~/.ssh/claude_vps"
#   "sec|178.17.50.45|22|root|~/.ssh/claude_vps_key"
# )

# VPS_POLL_INTERVAL=30
# VPS_SSH_TIMEOUT=5

# Пороги
# VPS_WARN_RAM=80
# VPS_CRIT_RAM=90
# VPS_WARN_CPU=80
# VPS_CRIT_CPU=90
# VPS_WARN_DISK=80
# VPS_CRIT_DISK=90
# VPS_BOOT_THRESHOLD=300
# VPS_STALE_SEC=120

# --- Пороги контекста --------------------------------------------------------
# CONTEXT_WARN=50
# CONTEXT_CRIT=70

# --- tmux-интеграция ---------------------------------------------------------
# TMUX_BRIDGE=auto

# --- Стоимость API -----------------------------------------------------------
# Автоопределение: подписка (cost=0) → теоретическая; API (cost>0) → реальная
# COST_MODEL="auto"

# --- Внешний вид -------------------------------------------------------------
# SEPARATOR=" │ "
# STYLE=plain
# LANG_RU=false

# --- Авто-фокус VPS ---------------------------------------------------------
# auto = определить активный VPS из transcript Claude Code
# Когда ты работаешь с сервером через MCP SSH, statusline автоматически
# разворачивает метрики этого сервера. Остальные — компактные точки.
#
# Маппинг MCP-имён на имена серверов в поллере:
# VPS_MCP_MAP=(
#   "main|vps-main"        # VPS_SERVERS имя "main" → MCP "vps-main"
#   "new|vps-new"          # VPS_SERVERS имя "new" → MCP "vps-new"
#   "sec|vps-secondary"    # VPS_SERVERS имя "sec" → MCP "vps-secondary"
# )
# VPS_FOCUS=auto           # auto | имя_сервера | none

# --- Лимиты использования H/W -----------------------------------------------
# Показывает остаток 5-часовой (H) и 7-дневной (W) квоты.
# Данные берутся через OAuth API (нужна авторизация через claude login).
# Кэшируется на 2 минуты.
# SHOW_LIMITS=true
# LIMITS_CACHE_SEC=120
