# ============================================================================
# claude-statusline — configuration
# File: ~/.claude/statusline.conf
#
# Uncomment and change parameters as needed.
# Changes apply automatically on next Claude response — no restart needed.
# ============================================================================

# --- What to show ------------------------------------------------------------

# SHOW_MODEL=true              # Model name (Opus / Sonnet / Haiku)
# SHOW_COST=true               # Cost (theoretical API or real)
# SHOW_CONTEXT=true            # Context window percentage
# SHOW_LINES=true              # Lines added/removed
# SHOW_DURATION=true           # Session duration
# SHOW_GIT=true                # Git branch + dirty status
# SHOW_TOKENS=false            # Token counts (input → output)
# SHOW_VPS=false               # VPS metrics: RAM, CPU load, disk

# --- Language ----------------------------------------------------------------
# LANG_RU=false                # true = Russian labels (стр, контекст, мин, etc.)

# --- VPS monitoring ----------------------------------------------------------
# Three modes:
#   SHOW_VPS=remote  — remote VPS via vps-poller (CC on Windows/Mac)
#   SHOW_VPS=local   — local machine metrics (CC running on VPS via SSH)
#   SHOW_VPS=false   — disabled (default)
#
# For remote mode, start vps-poller.sh + configure servers below.

# SHOW_VPS=false

# VPS server list for the poller.
# Format: "name|host|port|user|ssh-key"
#
# VPS_SERVERS=(
#   "prod|1.2.3.4|22|root|~/.ssh/my_key"
#   "staging|5.6.7.8|22|root|~/.ssh/my_key"
# )

# VPS_POLL_INTERVAL=30         # Poll interval (seconds)
# VPS_SSH_TIMEOUT=5            # SSH timeout (seconds), DOWN if exceeded

# Thresholds (% usage)
# VPS_WARN_RAM=80              # RAM → yellow
# VPS_CRIT_RAM=90              # RAM → red
# VPS_WARN_CPU=80              # CPU → yellow
# VPS_CRIT_CPU=90              # CPU → red
# VPS_WARN_DISK=80             # Disk → yellow
# VPS_CRIT_DISK=90             # Disk → red
# VPS_BOOT_THRESHOLD=300       # Uptime < 300s = BOOT status
# VPS_STALE_SEC=120            # Cache older than 120s = stale

# --- Auto-focus active VPS --------------------------------------------------
# When VPS_FOCUS=auto, the statusline detects which VPS you're working on:
#   1. Parses transcript for ssh/scp/sftp commands → matches IPs from VPS_SERVERS
#   2. Fallback: looks for MCP server names via VPS_MCP_MAP
# The active server shows ▶ marker with expanded RAM/Disk metrics.
#
# VPS_FOCUS=auto               # auto | server_name | none
#
# Optional MCP fallback (only needed if you use MCP SSH instead of Bash SSH):
# VPS_MCP_MAP=(
#   "prod|my-mcp-prod"         # VPS name → MCP connection name
#   "staging|my-mcp-staging"
# )

# --- Context thresholds ------------------------------------------------------
# CONTEXT_WARN=50              # % context → yellow
# CONTEXT_CRIT=70              # % context → red (time for /compact)

# --- tmux integration --------------------------------------------------------
# auto = enable automatically if Claude Code runs inside tmux
# TMUX_BRIDGE=auto             # auto | on | off

# --- API cost ----------------------------------------------------------------
# Auto-detection: subscription (cost=0) → theoretical; API (cost>0) → real
# COST_MODEL="auto"            # auto | opus | sonnet | haiku

# --- Usage limits (H/W) -----------------------------------------------------
# 5-hour (H) and 7-day (W) quota remaining.
# Requires authentication via claude login.
# SHOW_LIMITS=true
# LIMITS_CACHE_SEC=120         # Cache duration (seconds)

# --- Appearance --------------------------------------------------------------
# SEPARATOR=" │ "              # Separator between segments
# STYLE=plain                  # plain | minimal
